<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>nerve</title>
<link rel="stylesheet" href="/theme.css">
<script src="https://unpkg.com/force-graph@1.43.5/dist/force-graph.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
<!-- louvain : le bundle UMD graphology-library casse en navigateur (dépendance Node crypto) ;
     on charge le package standalone en ESM et on l'expose en global pour graph.js. -->
<script type="module">
  import louvain from "https://cdn.jsdelivr.net/npm/graphology-communities-louvain/+esm";
  window.graphologyLouvain = louvain;
</script>
</head>
<body>
  <div id="top">
    <textarea id="txt" placeholder="Colle un texte à transformer en graphe…"></textarea>
    <select id="llmModel" title="Modèle d'extraction — rapide : qwen2.5:7b-instruct · qualité : qwen3.6"></select>
    <button id="go">Extraire</button>
  </div>
  <div id="graph"></div>
  <div id="controls">
    <label>Couleur
      <select id="colorMode">
        <option value="community">Communauté</option>
        <option value="set">Set</option>
        <option value="type">Type</option>
        <option value="uniform">Uniforme</option>
      </select>
    </label>
    <label>Taille
      <select id="sizeMode">
        <option value="centrality">Centralité</option>
        <option value="mentions">Mentions</option>
        <option value="fixed">Fixe</option>
      </select>
    </label>
    <label>Palette
      <select id="paletteMode">
        <option value="default">Défaut</option>
        <option value="cb">Daltonien-safe</option>
      </select>
    </label>
    <button id="edgeLabelsBtn" class="toggle" title="Afficher le prédicat sur chaque arête">étiquettes</button>
    <button id="pathBtn" class="toggle" title="Surligner la plus longue chaîne de relations">chemin</button>
    <button id="themeBtn" class="toggle" title="Basculer thème clair / sombre">☾</button>
  </div>
  <div id="status"></div>
  <div id="legend"></div>
  <div id="factcard"></div>
  <div id="emptyState">
    <div class="glyph">⌗</div>
    <h2>Aucun graphe affiché</h2>
    <p>Colle un texte ci-dessus, ouvre un set à gauche, ou cherche une entité — la structure émerge ici.</p>
    <div class="acts"><span>Coller un texte ↑</span><span>Ouvrir un set ←</span><span>Chercher une entité ←</span></div>
  </div>
  <div id="side">
    <h3>Recherche</h3>
    <input id="q" placeholder="recherche sémantique…">
    <button id="searchBtn">Chercher</button>
    <div id="results"></div>
    <h3>Transverse</h3>
    <input id="ent" placeholder="entité (ex. Cluny)">
    <button id="transBtn">Sous-graphe</button>
    <h3>Sets</h3>
    <div id="sets"></div>
  </div>
  <script src="/graph.js"></script>
</body>
</html>
